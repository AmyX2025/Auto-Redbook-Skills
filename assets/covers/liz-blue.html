<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1440">
    <title>小红书封面 - Liz 经典蓝</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', 'Noto Sans SC', sans-serif;
            width: 1080px; height: 1440px; overflow: hidden;
        }
        .cover {
            width: 1080px; height: 1440px;
            background: #BAD2E2;
            display: flex; flex-direction: column;
            color: #1C1C38;
        }
        .top-area {
            padding: 56px 88px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .pill {
            background: #1C1C38; border-radius: 100px;
            padding: 16px 40px; display: inline-flex; align-items: center;
        }
        .pill-text {
            font-size: 24px; font-weight: 900; color: #FFFFFF;
            letter-spacing: 0.14em; text-transform: uppercase;
        }
        .issue-num {
            font-size: 24px; font-weight: 800; color: rgba(28,28,56,0.4);
            letter-spacing: 0.08em;
        }

        .title-section { padding: 44px 88px 0; }
        h1 {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 64px; font-weight: 700; line-height: 1.3;
            color: #1C1C38; margin-bottom: 14px;
        }
        .sub {
            font-size: 28px; font-weight: 700; color: rgba(28,28,56,0.48);
            letter-spacing: 0.06em;
        }

        .hook-section { padding: 40px 88px 0; }
        .hook-text {
            font-size: 31px; color: #FFFFFF; line-height: 1.85;
            font-weight: 400;
            padding: 36px 40px;
            background: #9696CA;
            border-radius: 24px;
        }
        .hook-text strong { font-weight: 800; color: #FFFFFF; }

        .spacer { flex: 1; }

        .stat-badge {
            padding: 0 88px 28px;
            display: flex; align-items: baseline; gap: 10px;
        }
        .stat-label {
            font-size: 20px; font-weight: 700; color: rgba(28,28,56,0.45);
            letter-spacing: 0.08em;
        }
        .stat-num {
            font-family: 'Nunito', sans-serif;
            font-size: 56px; color: #1C1C38; font-weight: 900; line-height: 1;
        }
        .stat-unit {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 32px; color: rgba(28,28,56,0.38); font-weight: 700;
        }

        .footer {
            padding: 28px 88px;
            border-top: 1px solid rgba(28,28,56,0.12);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sig {
            font-size: 28px; font-weight: 800; color: rgba(28,28,56,0.6);
            letter-spacing: 0.06em;
        }
        .sig-tag {
            font-size: 20px; font-weight: 600; color: rgba(28,28,56,0.32);
            letter-spacing: 0.06em; margin-top: 4px;
        }

        .hero-num {
            padding: 40px 88px 0; flex: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .hero-num .num-label {
            font-size: 24px; font-weight: 700; color: rgba(28,28,56,0.45);
            letter-spacing: 0.10em; margin-bottom: 16px;
        }
        .hero-num .big-num {
            font-size: 196px; font-weight: 900; line-height: 0.9; color: #1C1C38;
        }
        .hero-num .num-unit {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 64px; font-weight: 700; color: rgba(28,28,56,0.38); margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="cover">
        <div class="top-area">
            <div class="pill"><span class="pill-text">{{SERIES}}</span></div>
            <span class="issue-num">{{ISSUE}}</span>
        </div>

        <div class="title-section">
            <h1>{{TITLE}}</h1>
            <div class="sub">{{SUBTITLE}}</div>
        </div>

        {{HOOK_BLOCK}}

        <div class="spacer"></div>

        <div class="stat-badge">
            <span class="stat-label">{{STAT_LABEL}}</span>
            <span class="stat-num">{{STAT_NUMBER}}</span>
            <span class="stat-unit">{{STAT_UNIT}}</span>
        </div>
        <div class="footer">
            <div>
                <div class="sig">{{AUTHOR}}</div>
                <div class="sig-tag">{{AUTHOR_TAG}}</div>
            </div>
        </div>
    </div>
</body>
</html>
