<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1440">
    <title>小红书封面 - 暖橘风</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            width: 1080px; height: 1440px; overflow: hidden;
        }
        .cover {
            width: 1080px; height: 1440px;
            background: #FAFAF4;
            font-family: 'Noto Sans SC', sans-serif;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        .cover .top-accent {
            height: 4px; background: #D4602A; flex-shrink: 0;
        }
        .cover .top-meta {
            padding: 56px 96px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .cover .series {
            font-size: 24px; letter-spacing: 0.14em; color: #D4602A; font-weight: 500;
        }
        .cover .issue {
            font-size: 24px; color: #C0B4A8;
        }
        .cover .hero-num {
            padding: 60px 96px 0;
            flex: 1;
            display: flex; flex-direction: column; justify-content: center;
        }
        .cover .num-label {
            font-size: 26px; color: #B0A498; letter-spacing: 0.06em; margin-bottom: 28px;
        }
        .cover .big-num {
            font-family: 'Noto Serif SC', serif;
            font-size: 220px; font-weight: 700; line-height: 0.9;
            color: #D4602A; letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .cover .num-unit {
            font-family: 'Noto Serif SC', serif;
            font-size: 80px; font-weight: 600; color: #E8C0A8; line-height: 1;
        }
        .cover .title-block {
            padding: 0 96px 64px;
        }
        .cover .divline {
            width: 52px; height: 3px; background: #D4602A; margin-bottom: 40px;
        }
        .cover h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 80px; font-weight: 700; color: #1C1408; line-height: 1.25;
            margin-bottom: 32px;
        }
        .cover .sub {
            font-size: 34px; color: #7A6A5A; line-height: 1.85; font-weight: 300;
        }
        .cover .footer {
            padding: 40px 96px;
            border-top: 1px solid #E8E0D4;
            display: flex; justify-content: space-between; align-items: center;
        }
        .cover .auth-name {
            font-size: 28px; font-weight: 600; color: #1C1408;
        }
        .cover .auth-tag {
            font-size: 22px; color: #9A8A7A; margin-top: 6px;
        }
        .cover .footer-dot {
            width: 8px; height: 8px; background: #D4602A;
            border-radius: 50%; margin-right: 12px; display: inline-block; vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="cover">
        <div class="top-accent"></div>
        <div class="top-meta">
            <span class="series">{{SERIES}}</span>
            <span class="issue">{{ISSUE}}</span>
        </div>
        <div class="hero-num">
            <div class="num-label">{{STAT_LABEL}}</div>
            <div class="big-num">{{STAT_NUMBER}}</div>
            <div class="num-unit">{{STAT_UNIT}}</div>
        </div>
        <div class="title-block">
            <div class="divline"></div>
            <h1>{{TITLE}}</h1>
            <p class="sub">{{SUBTITLE}}</p>
        </div>
        <div class="footer">
            <div>
                <div class="auth-name"><span class="footer-dot"></span>{{AUTHOR}}</div>
                <div class="auth-tag">{{AUTHOR_TAG}}</div>
            </div>
        </div>
    </div>
</body>
</html>
